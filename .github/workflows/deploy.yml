name: Deploy to App Store

on:
  workflow_dispatch:
    inputs:
      upload:
        description: 'Upload to App Store Connect'
        required: true
        default: true
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Archive & Upload to App Store
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          echo "Using: $XCODE_PATH"
          xcodebuild -version

      - name: Install XcodeGen
        run: |
          curl -sL https://github.com/yonaskolb/XcodeGen/releases/latest/download/xcodegen.zip -o /tmp/xcodegen.zip
          unzip -q /tmp/xcodegen.zip -d /tmp/xcodegen
          XCODEGEN_BIN=$(find /tmp/xcodegen -name "xcodegen" -type f | head -1)
          sudo cp "$XCODEGEN_BIN" /usr/local/bin/xcodegen
          sudo chmod +x /usr/local/bin/xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Install Apple Distribution Certificate
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

      - name: Install Provisioning Profiles
        env:
          PROFILE_APP: ${{ secrets.PROVISIONING_PROFILE_APP }}
          PROFILE_CB: ${{ secrets.PROVISIONING_PROFILE_CONTENT_BLOCKER }}
          PROFILE_EXT: ${{ secrets.PROVISIONING_PROFILE_SAFARI_EXT }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          echo "$PROFILE_APP" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/app.mobileprovision
          echo "$PROFILE_CB" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/contentblocker.mobileprovision
          echo "$PROFILE_EXT" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/safariext.mobileprovision

          # Extract UUIDs for build settings
          APP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/app.mobileprovision))
          CB_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/contentblocker.mobileprovision))
          EXT_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/safariext.mobileprovision))

          # Rename files to UUID.mobileprovision (required by Xcode)
          mv ~/Library/MobileDevice/Provisioning\ Profiles/app.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${APP_UUID}.mobileprovision
          mv ~/Library/MobileDevice/Provisioning\ Profiles/contentblocker.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${CB_UUID}.mobileprovision
          mv ~/Library/MobileDevice/Provisioning\ Profiles/safariext.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${EXT_UUID}.mobileprovision

          echo "APP_PROFILE_UUID=$APP_UUID" >> $GITHUB_ENV
          echo "CB_PROFILE_UUID=$CB_UUID" >> $GITHUB_ENV
          echo "EXT_PROFILE_UUID=$EXT_UUID" >> $GITHUB_ENV

      - name: Setup App Store Connect API Key
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$API_KEY" > ~/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Shortless.xcodeproj \
            -scheme Shortless

      - name: Archive
        run: |
          xcodebuild archive \
            -project Shortless.xcodeproj \
            -scheme Shortless \
            -archivePath $RUNNER_TEMP/Shortless.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            ARCHS=arm64

      - name: Export & Upload to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>dev.pmartin1915.shortless</key>
              <string>Shortless AppStore</string>
              <key>dev.pmartin1915.shortless.ContentBlocker</key>
              <string>Shortless ContentBlocker AppStore</string>
              <key>dev.pmartin1915.shortless.SafariExtension</key>
              <string>Shortless SafariExtension AppStore</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Shortless.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -authenticationKeyPath ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID"

      - name: Clean Up
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
          rm -f $RUNNER_TEMP/certificate.p12
          rm -rf ~/private_keys
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles
