name: Shortless

options:
  bundleIdPrefix: dev.pmartin1915
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  ShortlessKit:
    path: ShortlessKit

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "2.1.0"
    CURRENT_PROJECT_VERSION: "10"
    ALWAYS_SEARCH_USER_PATHS: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    DEVELOPMENT_TEAM: NN8F5WX25R

targets:
  Shortless:
    type: application
    platform: iOS
    sources: ShortlessApp
    dependencies:
      - package: ShortlessKit
      - target: ShortlessContentBlocker
        embed: true
      - target: ShortlessSafariExtension
        embed: true
      - target: ShortlessVPNExtension
        embed: true
      - target: ShortlessWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pmartin1915.shortless
        PRODUCT_NAME: Shortless
        CODE_SIGN_ENTITLEMENTS: Shortless.entitlements
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Shortless AppStore"
    info:
      path: Shortless-Info.plist
      properties:
        CFBundleDisplayName: Shortless
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait

  ShortlessContentBlocker:
    type: app-extension
    platform: iOS
    sources: ShortlessContentBlocker
    dependencies:
      - package: ShortlessKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pmartin1915.shortless.ContentBlocker
        PRODUCT_NAME: ShortlessContentBlocker
        CODE_SIGN_ENTITLEMENTS: ShortlessContentBlocker/ShortlessContentBlocker.entitlements
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Shortless ContentBlocker AppStore"
    info:
      path: ShortlessContentBlocker/Info.plist
      properties:
        CFBundleDisplayName: Shortless Content Blocker
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.content-blocker
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ContentBlockerRequestHandler

  ShortlessSafariExtension:
    type: app-extension
    platform: iOS
    sources: ShortlessSafariExtension
    dependencies:
      - package: ShortlessKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pmartin1915.shortless.SafariExtension
        PRODUCT_NAME: ShortlessSafariExtension
        CODE_SIGN_ENTITLEMENTS: ShortlessSafariExtension/ShortlessSafariExtension.entitlements
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Shortless SafariExtension AppStore"
    info:
      path: ShortlessSafariExtension/Info.plist
      properties:
        CFBundleDisplayName: Shortless Safari Extension
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.web-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SafariWebExtensionHandler

  ShortlessVPNExtension:
    type: app-extension
    platform: iOS
    sources: ShortlessVPNExtension
    dependencies:
      - package: ShortlessKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pmartin1915.shortless.VPNExtension
        PRODUCT_NAME: ShortlessVPNExtension
        CODE_SIGN_ENTITLEMENTS: ShortlessVPNExtension/ShortlessVPNExtension.entitlements
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Shortless VPNExtension AppStore"
    info:
      path: ShortlessVPNExtension/Info.plist
      properties:
        CFBundleDisplayName: Shortless VPN Extension
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider

  ShortlessWidget:
    type: app-extension
    platform: iOS
    sources: ShortlessWidget
    dependencies:
      - package: ShortlessKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pmartin1915.shortless.Widget
        PRODUCT_NAME: ShortlessWidget
        CODE_SIGN_ENTITLEMENTS: ShortlessWidget/ShortlessWidget.entitlements
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Shortless Widget AppStore"
    info:
      path: ShortlessWidget/Info.plist
      properties:
        CFBundleDisplayName: Shortless Widget
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  ShortlessTests:
    type: bundle.unit-test
    platform: iOS
    sources: ShortlessTests
    dependencies:
      - target: Shortless
      - package: ShortlessKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pmartin1915.shortless.Tests
        PRODUCT_NAME: ShortlessTests
    info:
      path: ShortlessTests/Info.plist
      properties:
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"

schemes:
  Shortless:
    build:
      targets:
        Shortless: all
        ShortlessVPNExtension: all
        ShortlessWidget: all
    test:
      targets:
        - ShortlessTests
    run:
      config: Debug
